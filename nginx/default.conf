# /nginx/default.conf

# Configuración de FastCGI Cache
# DOC: Define la ruta física de la caché, niveles de subdirectorios, zona de memoria de 100MB y tiempo de inactividad de 60m para páginas procesadas por PHP.
fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=WORDPRESS:100m inactive=60m;
fastcgi_cache_key "$scheme$request_method$host$request_uri";
fastcgi_cache_use_stale error timeout invalid_header updating http_500 http_503;

server {
    listen 80;
    server_name _; # Atiende cualquier dominio, el proxy inverso maestro hace el filtrado
    root /var/www/html;
    index index.php;

    # Gzip Compression
    # DOC: Activa la compresión Gzip en tránsito para reducir el peso de los recursos estáticos enviados al cliente.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;
    gzip_min_length 1000;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Reglas de exclusión de caché (Bypass) para WordPress y WooCommerce
    # DOC: Bandera que determina si se debe omitir el microcaching de páginas (ej: en páginas dinámicas o dinámicas por sesión).
    set $skip_cache 0;

    # POST y peticiones con Query Strings no se cachean
    if ($request_method = POST) {
        set $skip_cache 1;
    }
    if ($query_string != "") {
        set $skip_cache 1;
    }

    # No cachear URIs específicas de WordPress
    if ($request_uri ~* "/wp-admin/|/xmlrpc.php|wp-.*.php|/feed/|index.php|sitemap(_index)?.xml") {
        set $skip_cache 1;
    }

    # No cachear páginas críticas de WooCommerce (Carrito, Checkout, Mi Cuenta)
    if ($request_uri ~* "/cart/*|/checkout/*|/my-account/*|/addons/*") {
        set $skip_cache 1;
    }

    # No usar caché para usuarios identificados o con productos en el carrito
    if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in|woocommerce_items_in_cart|woocommerce_cart_hash") {
        set $skip_cache 1;
    }

    # Reglas para WordPress Permalinks
    # DOC: Redirige las URLs amigables o rutas inexistentes directamente al archivo index.php de WordPress.
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Pasar peticiones PHP a PHP-FPM
    # DOC: Redirige archivos PHP al servicio PHP-FPM de WordPress, aplicando el microcaching de 1s para visitas públicas y anónimas.
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wordpress:9000; # 'wordpress' es el nombre del servicio en docker-compose
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300; # Aumentar si tienes procesos largos

        # Configuración de FastCGI Cache (Microcaching)
        fastcgi_cache WORDPRESS;
        fastcgi_cache_valid 200 301 302 1s; # Microcaching de 1 segundo para reducir carga
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
        add_header X-FastCGI-Cache $upstream_cache_status;
    }

    # Caché de navegador para activos estáticos
    # DOC: Configura al navegador del cliente para que retenga imágenes, scripts y hojas de estilo en caché por 1 año.
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Denegar acceso a archivos sensibles
    location ~ /\.ht {
        deny all;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }
}