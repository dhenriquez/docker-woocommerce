; php-conf/custom.ini

; DOC: Límites de recursos asignados a PHP para evitar saturación del servidor y permitir la subida de imágenes/plugins grandes.
max_execution_time = 300
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_input_vars = 3000

; Optimización de OPcache para alto rendimiento
; DOC: Mantiene el código PHP precompilado en la memoria RAM para evitar lecturas de disco innecesarias.
opcache.enable = 1
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0

; Manejador de sesiones en Redis
; DOC: Almacena las sesiones activas en la memoria caché Redis (RAM) en vez de escribir en archivos de disco físico, aumentando la velocidad.
session.save_handler = redis
session.save_path = "tcp://redis:6379"